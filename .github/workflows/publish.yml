name: publish

# Cut a release by pushing a tag:  npm version <patch|minor|major> && git push --follow-tags
# Publishes @quentinandrieu/design-system to the PUBLIC npm registry.
# Requires an npm automation token stored as the NPM_TOKEN repo secret.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
